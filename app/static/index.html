<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Syslog AI Monitor</title>
<style>
  :root {
    --bg: #f6f8fa; --panel: #ffffff; --panel2: #eef1f4; --text: #1f2328;
    --muted: #59636e; --line: #d0d7de;
    --ok: #1a7f37; --warning: #9a6700; --error: #cf222e; --critical: #a40e26;
    --info: #0969da;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
  }
  header {
    position: sticky; top: 0; z-index: 20; background: var(--bg);
    padding: 12px 24px; border-bottom: 1px solid var(--line);
  }
  .hbar { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .hbar.links { margin-top: 10px; }
  .hbar.links a { color: var(--info); text-decoration: none; font-size: 13px; white-space: nowrap; }
  .hbar.links a:hover { text-decoration: underline; }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  .spacer { flex: 1; }
  .meta { color: var(--muted); font-size: 13px; }
  .pill {
    display: inline-block; padding: 2px 10px; border-radius: 999px;
    font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em;
  }
  .status-ok { background: rgba(46,160,67,.18); color: var(--ok); }
  .status-warning { background: rgba(210,153,34,.18); color: var(--warning); }
  .status-error { background: rgba(248,81,73,.18); color: var(--error); }
  main { max-width: 980px; margin: 0 auto; padding: 24px; }
  .banner {
    padding: 16px 20px; border-radius: 10px; margin-bottom: 24px;
    border: 1px solid var(--line); background: var(--panel);
  }
  .banner h2 { margin: 0 0 6px; font-size: 16px; }
  .banner.s-ok { border-left: 4px solid var(--ok); }
  .banner.s-warning { border-left: 4px solid var(--warning); }
  .banner.s-error { border-left: 4px solid var(--error); }
  h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 28px 0 12px; }
  .finding {
    border: 1px solid var(--line); border-radius: 8px; padding: 14px 16px;
    margin-bottom: 12px; background: var(--panel);
  }
  .finding .top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .finding .title { font-weight: 600; }
  .sev { padding: 1px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
  .sev-info { background: rgba(88,166,255,.18); color: var(--info); }
  .sev-warning { background: rgba(210,153,34,.18); color: var(--warning); }
  .sev-error { background: rgba(248,81,73,.18); color: var(--error); }
  .sev-critical { background: rgba(218,54,51,.25); color: var(--critical); }
  .cat { color: var(--muted); font-size: 12px; }
  .finding .detail { margin: 4px 0; }
  .finding .evidence {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px;
    background: var(--panel2); padding: 8px 10px; border-radius: 6px; color: var(--muted);
    white-space: pre-wrap; word-break: break-word; margin: 8px 0;
  }
  .finding .rec { font-size: 13px; color: var(--info); }
  .history-item {
    border: 1px solid var(--line); border-radius: 8px; margin-bottom: 8px; background: var(--panel);
  }
  .history-item summary {
    padding: 12px 16px; cursor: pointer; list-style: none;
  }
  .history-item summary::-webkit-details-marker { display: none; }
  .history-item summary::marker { content: ""; }
  /* Meta (status + time) on its own row, summary stacked below — reads well
     on both desktop and narrow mobile screens. */
  .history-item .hrow {
    display: flex; gap: 10px; align-items: center; margin-bottom: 6px; flex-wrap: wrap;
  }
  .history-item .when { color: var(--muted); font-size: 13px; }
  .history-item .sum { color: var(--text); line-height: 1.55; }
  .history-body { padding: 0 16px 14px; }
  .empty { color: var(--muted); padding: 20px 0; }
  .runbtn {
    background: var(--info); color: #ffffff; border: none; border-radius: 6px;
    padding: 7px 13px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .runbtn:disabled { opacity: .6; cursor: default; }
  .runmsg { color: var(--muted); font-size: 13px; }
  @media (max-width: 480px) {
    header { padding: 10px 14px; }
    header h1 { font-size: 16px; }
    main { padding: 16px; }
    /* Pack header items left; drop the spacer (it scattered links across
       uneven lines) and the Refresh button (data auto-refreshes). */
    .hbar .spacer { display: none; }
    .hbar { gap: 6px 12px; }
    .meta { font-size: 12px; }
    .refresh { display: none; }
    /* Actions become one tidy, swipeable row instead of a ragged wrap. */
    .hbar.links {
      margin-top: 10px; gap: 18px;
      flex-wrap: nowrap; overflow-x: auto;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .hbar.links::-webkit-scrollbar { display: none; }
    .hbar.links > * { flex: 0 0 auto; }
  }
  button.refresh {
    background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px;
  }
  button.refresh:hover { background: var(--line); }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  /* Weekly pattern section */
  .weekly-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .runbtn.small { font-size: 12px; padding: 5px 11px; }
  .subhead { font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 16px 0 8px; }
  .trend { padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 14px; line-height: 1.5; }
  .trend:last-child { border-bottom: none; }
  .dir { font-weight: 700; font-size: 11px; padding: 1px 7px; border-radius: 4px; margin-right: 8px; white-space: nowrap; }
  .dir-new { background: rgba(9,105,218,.15); color: var(--info); }
  .dir-increasing { background: rgba(207,34,46,.15); color: var(--error); }
  .dir-steady { background: rgba(89,99,110,.15); color: var(--muted); }
  .dir-decreasing, .dir-resolved { background: rgba(26,127,55,.15); color: var(--ok); }
  .watchlist { margin: 6px 0 0; padding-left: 20px; }
  .watchlist li { margin: 5px 0; }
</style>
</head>
<body>
<header>
  <div class="hbar">
    <h1>🛰️ Syslog AI Monitor</h1>
    <span id="headStatus"></span>
    <div class="spacer"></div>
    <span class="meta" id="buffered"></span>
    <button class="refresh" onclick="load()">Refresh</button>
  </div>
  <div class="hbar links">
    <button class="runbtn" onclick="runNow(this)">▶ Run evaluation now</button>
    <span class="runmsg" id="runmsg"></span>
    <div class="spacer"></div>
    <a href="/api/health" target="_blank" rel="noopener">Health</a>
    <a href="/docs" target="_blank" rel="noopener">API&nbsp;docs</a>
    <a href="/api/history?limit=200" target="_blank" rel="noopener">History&nbsp;JSON</a>
    <a href="/api/weekly" target="_blank" rel="noopener">Weekly&nbsp;JSON</a>
    <a href="/api/status" target="_blank" rel="noopener">Status&nbsp;JSON</a>
  </div>
</header>

<main>
  <div id="latest"></div>

  <h3 class="weekly-head">
    Last 7 days — patterns
    <button class="runbtn small" onclick="runWeekly(this)">▶ Run weekly review</button>
    <span class="runmsg" id="weeklymsg"></span>
  </h3>
  <div id="weekly"><div class="empty">Loading…</div></div>

  <h3>History</h3>
  <div id="history"><div class="empty">Loading…</div></div>
</main>

<script>
const fmt = (ts) => ts ? new Date(ts * 1000).toLocaleString() : "—";
const esc = (s) => (s ?? "").toString().replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function findingHTML(f) {
  const sev = (f.severity || "info").toLowerCase();
  return `<div class="finding">
    <div class="top">
      <span class="sev sev-${esc(sev)}">${esc(sev)}</span>
      <span class="title">${esc(f.title)}</span>
      <span class="cat">${esc(f.category)} · ×${esc(f.occurrences)}</span>
    </div>
    <div class="detail">${esc(f.detail)}</div>
    ${f.evidence ? `<div class="evidence">${esc(f.evidence)}</div>` : ""}
    ${f.recommendation ? `<div class="rec">→ ${esc(f.recommendation)}</div>` : ""}
  </div>`;
}

function renderLatest(latest) {
  const el = document.getElementById("latest");
  if (!latest) {
    el.innerHTML = `<div class="banner"><h2>No evaluations yet</h2>
      <div class="meta">Logs are being collected. The first hourly evaluation will appear here.</div></div>`;
    return;
  }
  const p = latest.payload || {};
  const status = (p.overall_status || "ok").toLowerCase();
  const findings = p.findings || [];
  el.innerHTML = `
    <div class="banner s-${esc(status)}">
      <h2>Latest evaluation — ${fmt(latest.ts)}</h2>
      <div>${esc(p.summary)}</div>
      <div class="meta" style="margin-top:6px">${esc(latest.log_count)} log lines analyzed · ${findings.length} finding(s)</div>
    </div>
    ${findings.length ? `<h3>Findings</h3>${findings.map(findingHTML).join("")}`
                      : `<div class="empty">No issues found in the latest period. ✅</div>`}`;
}

function statusPill(status) {
  const s = (status || "ok").toLowerCase();
  return `<span class="pill status-${esc(s)}">${esc(s)}</span>`;
}

// Weekly period_status (ok|watch|action) reuses the hourly status colors.
const WEEKLY_COLOR = { action: "error", watch: "warning", ok: "ok" };

function recurringHTML(r) {
  const sev = (r.severity || "info").toLowerCase();
  return `<div class="finding">
    <div class="top">
      <span class="sev sev-${esc(sev)}">${esc(sev)}</span>
      <span class="title">${esc(r.title)}</span>
      <span class="cat">${esc(r.category)} · ${esc(r.days_seen)} day(s) · ${esc(r.frequency)}</span>
    </div>
    <div class="detail">${esc(r.detail)}</div>
    ${r.recommendation ? `<div class="rec">→ ${esc(r.recommendation)}</div>` : ""}
  </div>`;
}

function trendHTML(t) {
  const d = (t.direction || "steady").toLowerCase();
  const label = {new:"NEW", increasing:"▲ UP", steady:"= STEADY",
                 decreasing:"▼ DOWN", resolved:"✓ RESOLVED"}[d] || d;
  return `<div class="trend"><span class="dir dir-${esc(d)}">${esc(label)}</span><b>${esc(t.title)}</b> — ${esc(t.detail)}</div>`;
}

function renderWeekly(w) {
  const el = document.getElementById("weekly");
  if (!w) {
    el.innerHTML = `<div class="empty">No weekly review yet. It runs once a day over the last few days of findings — or click “Run weekly review” above.</div>`;
    return;
  }
  const p = w.payload || {};
  const s = (p.period_status || "ok").toLowerCase();
  const color = WEEKLY_COLOR[s] || "ok";
  const recurring = p.recurring_issues || [];
  const trends = p.trends || [];
  const watch = p.watchlist || [];
  el.innerHTML = `
    <div class="banner s-${esc(color)}">
      <h2>${esc(w.window_days)}-day review <span class="pill status-${esc(color)}">${esc(s)}</span></h2>
      <div>${esc(p.overall_assessment)}</div>
      <div class="meta" style="margin-top:6px">${esc(w.finding_count)} hourly evaluations reviewed · ${fmt(w.period_start)} → ${fmt(w.period_end)} · reviewed ${fmt(w.ts)}</div>
    </div>
    ${recurring.length ? `<div class="subhead">Recurring issues</div>${recurring.map(recurringHTML).join("")}` : ""}
    ${trends.length ? `<div class="subhead">Trends</div>${trends.map(trendHTML).join("")}` : ""}
    ${watch.length ? `<div class="subhead">Watchlist</div><ul class="watchlist">${watch.map(x => `<li>${esc(x)}</li>`).join("")}</ul>` : ""}
    ${(!recurring.length && !trends.length && !watch.length) ? `<div class="empty">No notable patterns this period. ✅</div>` : ""}`;
}

function renderHistory(items) {
  const el = document.getElementById("history");
  if (!items.length) { el.innerHTML = `<div class="empty">No history yet.</div>`; return; }
  el.innerHTML = items.map(it => {
    const p = it.payload || {};
    const findings = p.findings || [];
    return `<details class="history-item">
      <summary>
        <div class="hrow">
          ${statusPill(p.overall_status)}
          <span class="when">${fmt(it.ts)}</span>
        </div>
        <div class="sum">${esc(p.summary)}</div>
      </summary>
      <div class="history-body">
        ${findings.length ? findings.map(findingHTML).join("")
                          : `<div class="empty">No issues found.</div>`}
      </div>
    </details>`;
  }).join("");
}

async function load() {
  try {
    const [statusRes, histRes, weeklyRes] = await Promise.all([
      fetch("/api/status").then(r => r.json()),
      fetch("/api/history?limit=200").then(r => r.json()),
      fetch("/api/weekly").then(r => r.json()),
    ]);
    renderLatest(statusRes.latest);
    document.getElementById("buffered").textContent =
      `${statusRes.buffered_logs} logs buffered`;
    document.getElementById("headStatus").innerHTML =
      statusRes.latest ? statusPill((statusRes.latest.payload || {}).overall_status) : "";
    renderWeekly(weeklyRes);
    renderHistory(histRes.findings || []);
  } catch (e) {
    document.getElementById("latest").innerHTML =
      `<div class="banner s-error"><h2>Could not load data</h2><div class="meta">${esc(e)}</div></div>`;
  }
}

async function runNow(btn) {
  const msg = document.getElementById("runmsg");
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = "Running…"; msg.textContent = "Evaluating buffered logs…";
  try {
    const r = await fetch("/api/run-now", { method: "POST" }).then(x => x.json());
    msg.textContent = r.ran ? "Done — results updated below." : "Nothing to evaluate yet.";
    await load();
  } catch (e) {
    msg.textContent = "Failed: " + e;
  } finally {
    btn.disabled = false; btn.textContent = orig;
    setTimeout(() => { msg.textContent = ""; }, 6000);
  }
}

async function runWeekly(btn) {
  const msg = document.getElementById("weeklymsg");
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = "Reviewing…"; msg.textContent = "Reviewing recent findings…";
  try {
    const r = await fetch("/api/run-weekly", { method: "POST" }).then(x => x.json());
    msg.textContent = r.ran ? "Done — patterns updated below." : "No findings to review yet.";
    await load();
  } catch (e) {
    msg.textContent = "Failed: " + e;
  } finally {
    btn.disabled = false; btn.textContent = orig;
    setTimeout(() => { msg.textContent = ""; }, 6000);
  }
}

load();
setInterval(load, 60000);  // auto-refresh each minute
</script>
</body>
</html>
